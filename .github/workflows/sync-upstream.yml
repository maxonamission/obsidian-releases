name: Sync upstream and keep plugin entry at end

on:
  schedule:
    - cron: '0 7 * * *' # Daily at 07:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  sync-and-fix-order:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/obsidianmd/obsidian-releases.git
          git fetch upstream master

      - name: Merge upstream
        run: |
          # Attempt a clean merge; on conflict in community-plugins.json
          # accept the upstream version — we re-append our entry next.
          if ! git merge upstream/master -m "Sync with upstream"; then
            git checkout --theirs community-plugins.json
            git add community-plugins.json
            # For any other conflicted files, accept upstream
            git diff --name-only --diff-filter=U | while read f; do
              git checkout --theirs "$f"
              git add "$f"
            done
            git commit --no-edit
          fi

      - name: Ensure voxtral-transcribe is last entry
        run: |
          python3 << 'PYEOF'
          import json, sys

          PLUGIN_ID = "voxtral-transcribe"

          with open("community-plugins.json", "r") as f:
              plugins = json.load(f)

          # Already at the end — nothing to do
          if plugins and plugins[-1].get("id") == PLUGIN_ID:
              print(f"✓ {PLUGIN_ID} is already the last entry — no changes needed")
              sys.exit(0)

          # Find and remove existing entry
          entry = None
          for i, p in enumerate(plugins):
              if p.get("id") == PLUGIN_ID:
                  entry = plugins.pop(i)
                  break

          if entry is None:
              print(f"⚠ {PLUGIN_ID} not found — adding default entry")
              entry = {
                  "id": "voxtral-transcribe",
                  "name": "Voxtral Transcribe",
                  "author": "maxonamission",
                  "description": "Speech-to-text dictation using Mistral Voxtral. Supports real-time streaming, voice commands (headings, lists, to-dos), and automatic text correction.",
                  "repo": "maxonamission/obsidian-voxtral"
              }

          # Append at end
          plugins.append(entry)

          with open("community-plugins.json", "w") as f:
              json.dump(plugins, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"✓ Moved {PLUGIN_ID} to end of list")
          PYEOF

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add community-plugins.json
            git commit -m "Sync upstream and move voxtral-transcribe to end of list"
            git push origin master
          fi
